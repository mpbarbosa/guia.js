# AI Workflow Automation Configuration
# Generated by Configuration Wizard on 2025-12-31 18:16:52
# Updated on 2026-01-21 to correct project classification as SPA
# Updated on 2026-03-23 to add project.version (maintained by sync-version skill)

project:
  name: "guia_js"
  version: "0.17.1-alpha"
  kind: "location_based_service"
  description: "Vue.js/TypeScript tourist guide SPA with Brazilian geocoding and address parsing (municipality, district, neighbourhood)"
tech_stack:
  primary_language: "typescript"
  framework: "vue"
  build_system: "npm"
  test_framework: "jest"
  test_command: "npm test"
  lint_command: "npm run lint:md"
  lint_commands:
    markdown: "npm run lint:md"
  routing: "hash_based"
  spa_entry: "src/main.ts"
structure:
  source_dirs:
    - src
  test_dirs:
    - tests
    - __tests__
  docs_dirs:
    - docs
  ui_dirs:
    - src/html
    - src/views
  css_dirs:
    - src
  static_assets:
    - src/index.html
    - src/favicon.ico

# Workflow Step Configuration
ai_personas:
  enabled:
    - typescript_reviewer        # TypeScript primary SPA with strict typing across components/services/views
    - ux_analyst                 # Vue.js SPA: map interactions, geocoding displays, onboarding flow, HTMLDisplayer components
    - accessibility_expert       # accessibility-compliance.css, skip-link.css, reduced-motion.css, HtmlSpeechSynthesisDisplayer — deliberate a11y work
    - async_performance_engineer # GeolocationService (async callbacks), ibira.js fetching, observers/, service worker, OverpassService
    - performance_engineer       # Vite SPA build, MapLibre GL rendering, service worker caching, performance-optimizations.css, timing/ dir
    - security_expert            # AwsGeocoder.ts (AWS credentials), deps:audit script, security_audit appears in all routing steps
    - test_engineer              # Jest + @vue/test-utils, jsdom, multiple suites (unit/e2e/features/services/visual/chrome)
    - code_quality_analyst       # ESLint flat config for JS surfaces plus TypeScript/Vue code quality review
    - documentation_expert       # jsdoc + docs/, JSDoc comments required; docs:generate script
    - technical_writer           # markdownlint-cli2, CHANGELOG, docs/, many markdown files
    - git_specialist             # deploy script, version sync (check:version, update:version-refs, update:badges)
    - devops_engineer            # vite.config.js, multiple jest configs (jest.config.unit.js, jest.config.e2e.js), tsconfig.json
    - dependency_analyst         # ibira.js + maplibre-gl + vue + vue-router + bootstrap prod deps; deps:check/deps:audit scripts
    - architecture_reviewer      # SPA layers: views/components/services/features/coordination/observers/core/utils/data
    - aws_serverless_engineer    # AwsGeocoder.ts uses AWS Location Service (POST /api/geocode/reverse endpoint)
  disabled:
    - prompt_engineer            # Not an AI project
    - api_designer               # SPA consuming APIs, not designing/serving an HTTP API

workflow:
  settings:
    smart_execution: true
    parallel_execution: true
    ai_cache_enabled: true
    auto_commit: false
    multi_stage_pipeline: true
    ml_optimize: false

