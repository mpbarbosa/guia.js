# update-ibira.yml
# Checks for a new ibira.js release on GitHub and updates the jsDelivr CDN
# URL in src/guia.ts and src/index.html, the npm dependency tag in
# package.json, the TypeScript ambient module declaration in
# src/types/paraty-geocore.d.ts, and any test/documentation files that
# reference the version string, then opens a pull request with the full set
# of changes.
#
# ibira.js is consumed via a jsDelivr CDN URL hard-coded in src/guia.ts and
# src/index.html (primary), with a GitHub-sourced npm package in package.json
# as a fallback. Both the CDN URL and the npm tag must be updated together.
#
# CDN URL pattern:
#   https://cdn.jsdelivr.net/gh/mpbarbosa/ibira.js@<TAG>/src/index.js
#
# npm dependency pattern:
#   "ibira.js": "github:mpbarbosa/ibira.js#<TAG>"
#
# Triggers:
#   - Weekly schedule (Thursday 09:00 UTC) — keeps the dependency current
#   - workflow_dispatch — pin to a specific version or force a refresh

name: Update ibira.js

on:
  schedule:
    - cron: '0 9 * * 4'   # every Thursday at 09:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: |
          ibira.js tag to update to (e.g. v0.3.0).
          Leave blank to use the latest published release.
        required: false
        default: ''

permissions:
  contents: write        # push update branch
  pull-requests: write   # open / update PR

# Prevent concurrent runs from racing on the same PR branch.
# cancel-in-progress: false queues the second run rather than dropping it,
# ensuring every scheduled or manual trigger is eventually processed.
concurrency:
  group: update-ibira
  cancel-in-progress: false

jobs:
  update-ibira:
    name: Check & Update ibira.js
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      # ── 3. Resolve target version ─────────────────────────────────────────────
      - name: Resolve target ibira.js version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION#v}"
            TAG="v${VERSION}"
            echo "Source: workflow_dispatch input"
          else
            # Use git ls-remote to find the latest tag (works without auth for public repos,
            # and avoids the GitHub Releases API which requires the repo to have "releases").
            TAG="$(git ls-remote --tags --refs --sort=-version:refname \
              https://github.com/mpbarbosa/ibira.js.git \
              | head -1 | awk '{print $2}' | sed 's|refs/tags/||')"
            [[ -n "${TAG}" ]] || { echo "❌  Could not determine latest ibira.js tag." >&2; exit 1; }
            VERSION="${TAG#v}"
            echo "Source: git ls-remote latest tag"
          fi

          CDN_URL="https://cdn.jsdelivr.net/gh/mpbarbosa/ibira.js@${VERSION}/src/index.js"
          NPM_REF="github:mpbarbosa/ibira.js#${TAG}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "cdn_url=${CDN_URL}" >> "$GITHUB_OUTPUT"
          echo "npm_ref=${NPM_REF}" >> "$GITHUB_OUTPUT"
          echo "ℹ️  Target: ibira.js ${TAG}"
          echo "ℹ️  CDN URL: ${CDN_URL}"
          echo "ℹ️  npm ref: ${NPM_REF}"

      # ── 4. Check current version (CDN + npm) ─────────────────────────────────
      # Both artifacts must match the target for an early exit. Checking only
      # the CDN URL would silently skip the npm dep when the two drift apart
      # (e.g. after a mid-run failure or a manual partial update).
      - name: Check current ibira.js version in src/guia.ts and package.json
        id: current
        run: |
          # CDN URL currently in src/guia.ts
          CURRENT_URL="$(grep -oP "https://cdn\.jsdelivr\.net/gh/mpbarbosa/ibira\.js@[^/]+/src/index\.js" src/guia.ts | head -1)"
          CURRENT_VERSION="$(echo "${CURRENT_URL}" | grep -oP '(?<=ibira\.js@)[^/]+')"

          # npm dependency ref currently in package.json
          CURRENT_NPM_REF="$(grep -oP '(?<="ibira\.js": ")[^"]+' package.json | head -1)"

          echo "current_url=${CURRENT_URL}"           >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "current_npm_ref=${CURRENT_NPM_REF}"   >> "$GITHUB_OUTPUT"

          TARGET_URL="${{ steps.resolve.outputs.cdn_url }}"
          TARGET_NPM_REF="${{ steps.resolve.outputs.npm_ref }}"

          CDN_OK=false
          NPM_OK=false
          [[ "${CURRENT_URL}"     == "${TARGET_URL}"     ]] && CDN_OK=true
          [[ "${CURRENT_NPM_REF}" == "${TARGET_NPM_REF}" ]] && NPM_OK=true

          echo "ℹ️  CDN: ${CURRENT_URL}  (up-to-date: ${CDN_OK})"
          echo "ℹ️  npm: ${CURRENT_NPM_REF}  (up-to-date: ${NPM_OK})"

          if [[ "${CDN_OK}" == "true" && "${NPM_OK}" == "true" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "✅  ibira.js CDN and npm dep are both already at ${{ steps.resolve.outputs.tag }} — nothing to do."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            [[ "${CDN_OK}" != "true" ]] && echo "ℹ️  CDN needs update: ${CURRENT_URL}  →  ${TARGET_URL}"
            [[ "${NPM_OK}" != "true" ]] && echo "ℹ️  npm dep needs update: ${CURRENT_NPM_REF}  →  ${TARGET_NPM_REF}"
          fi

      # ── 5. Update CDN URL in src/guia.ts ─────────────────────────────────────
      - name: Update ibira.js CDN URL in src/guia.ts
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"

          sed -i "s|${OLD_URL}|${NEW_URL}|g" src/guia.ts
          echo "✅  src/guia.ts updated."

      # ── 6. Update CDN URL in src/index.html ──────────────────────────────────
      # ibira.js appears twice in index.html: once in a <link rel="modulepreload">
      # and once in a dynamic import() call inside a <script> block.
      - name: Update ibira.js CDN URL in src/index.html
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"

          sed -i "s|${OLD_URL}|${NEW_URL}|g" src/index.html
          COUNT="$(grep -c "${NEW_URL}" src/index.html || true)"
          echo "✅  src/index.html updated (${COUNT} occurrence(s) replaced)."

      # ── 7. Update npm dependency in package.json ──────────────────────────────
      # ibira.js has a GitHub-sourced npm fallback dependency. Update the tag
      # reference alongside the CDN URL so both stay in sync.
      # Uses current_npm_ref (the actual value in package.json) rather than
      # reconstructing it from current_version — these can differ when CDN and
      # npm have drifted to different versions.
      - name: Update ibira.js npm dependency in package.json
        if: steps.current.outputs.up_to_date != 'true'
        env:
          OLD_NPM_REF: ${{ steps.current.outputs.current_npm_ref }}
          NEW_NPM_REF: ${{ steps.resolve.outputs.npm_ref }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const oldRef = process.env.OLD_NPM_REF;
          const newRef = process.env.NEW_NPM_REF;
          let content = fs.readFileSync('package.json', 'utf8');
          const updated = content.split(oldRef).join(newRef);
          if (updated === content) {
            console.warn('⚠️  No npm dependency replacement made in package.json — pattern not found.');
          } else {
            fs.writeFileSync('package.json', updated);
            console.log('✅  package.json npm dependency updated: ' + oldRef + '  →  ' + newRef);
          }
          EOF

      # ── 8. Update CDN URL in src/types/paraty-geocore.d.ts ───────────────────
      # The TypeScript ambient module declarations include the CDN URL as a
      # module name — keep it aligned with the runtime CDN URL.
      - name: Update ibira.js CDN URL in src/types/paraty-geocore.d.ts
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"

          if grep -q "ibira" src/types/paraty-geocore.d.ts 2>/dev/null; then
            sed -i "s|${OLD_URL}|${NEW_URL}|g" src/types/paraty-geocore.d.ts
            echo "✅  src/types/paraty-geocore.d.ts updated."
          else
            echo "ℹ️  No ibira.js CDN URL found in src/types/paraty-geocore.d.ts — skipping."
          fi

      # ── 9. Install updated dependencies ──────────────────────────────────────
      # Run npm install so the new ibira.js npm fallback is fetched and
      # package-lock.json is updated before tests run.
      - name: Install updated npm dependencies
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          npm install
          echo "✅  npm install completed."

      # ── 10. Update CDN URL in test files ─────────────────────────────────────
      # Some test files reference the ibira.js CDN URL directly. These must be
      # updated BEFORE running tests so they remain consistent.
      - name: Adjust ibira.js related tests
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"
          OLD_VERSION="${{ steps.current.outputs.current_version }}"
          NEW_VERSION="${{ steps.resolve.outputs.version }}"

          echo "ℹ️  Scanning test/ and __tests__/ for ibira.js CDN URL references…"

          mapfile -t TEST_FILES < <(grep -rl "ibira" test/ __tests__/ 2>/dev/null || true)

          if [[ ${#TEST_FILES[@]} -eq 0 ]]; then
            echo "ℹ️  No ibira.js references found in test files — nothing to adjust."
          else
            echo "📄  Test files with ibira.js references: ${TEST_FILES[*]}"

            for f in "${TEST_FILES[@]}"; do
              # Replace full CDN URL first to avoid double-processing the version token
              if [[ -n "${OLD_URL}" ]]; then
                sed -i "s|${OLD_URL}|${NEW_URL}|g" "${f}"
              fi
              # Replace any remaining bare version strings on ibira lines
              if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
                grep -n "ibira" "${f}" | grep -q "${OLD_VERSION}" && \
                  sed -i "/ibira/s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}" || true
              fi
              echo "   ✏️  Updated: ${f}"
            done

            echo "✅  Test files adjusted."
          fi

      # ── 11. Run validation ────────────────────────────────────────────────────
      - name: Run validation (npm run validate)
        if: steps.current.outputs.up_to_date != 'true'
        run: npm run validate

      # ── 12. Run tests ─────────────────────────────────────────────────────────
      # Skip test suites that require sibling repos with their own dependencies
      # (paraty_geocore.js → bessa_patterns.ts) not available in this workflow's
      # CI environment. Those suites are covered by dedicated CI pipelines.
      - name: Run unit & integration tests
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          npx jest \
            --testPathIgnorePatterns="__tests__/types/paraty-geocore.test.js" \
            --testPathIgnorePatterns="test/core/GeocodingState.test.js"

      # ── 13. Update ibira.js related documentation ─────────────────────────────
      # Replaces the old CDN URL and version tag in all Markdown files so that
      # CDN snippets and version references stay accurate.
      - name: Update ibira.js related documentation
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"
          OLD_VERSION="${{ steps.current.outputs.current_version }}"
          NEW_VERSION="${{ steps.resolve.outputs.version }}"

          echo "ℹ️  Scanning Markdown files for ibira.js references…"

          mapfile -t DOC_FILES < <(find . -name '*.md' \
            ! -path './node_modules/*' \
            ! -path './.ai_workflow/*' \
            -print 2>/dev/null || true)

          UPDATED=0
          for f in "${DOC_FILES[@]}"; do
            if grep -q "ibira" "${f}" 2>/dev/null; then
              # Replace full CDN URL first (avoids double-processing the version token)
              if [[ -n "${OLD_URL}" ]]; then
                sed -i "s|${OLD_URL}|${NEW_URL}|g" "${f}"
              fi
              # Replace any remaining bare version strings on ibira lines
              if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
                grep -n "ibira" "${f}" | grep -q "${OLD_VERSION}" && \
                  sed -i "/ibira/s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}" || true
              fi
              echo "   ✏️  Updated: ${f}"
              UPDATED=$((UPDATED + 1))
            fi
          done

          if [[ ${UPDATED} -eq 0 ]]; then
            echo "ℹ️  No ibira.js references found in documentation — nothing to update."
          else
            echo "✅  Updated ${UPDATED} documentation file(s)."
          fi

      # ── 14. Open pull request ─────────────────────────────────────────────────
      - name: Create pull request
        if: steps.current.outputs.up_to_date != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-ibira-${{ steps.resolve.outputs.version }}
          delete-branch: true
          commit-message: |
            chore(deps): update ibira.js to ${{ steps.resolve.outputs.tag }}

            Update ibira.js jsDelivr CDN URL and npm dependency to ${{ steps.resolve.outputs.tag }}.
            CDN URL: ${{ steps.resolve.outputs.cdn_url }}
            npm ref: ${{ steps.resolve.outputs.npm_ref }}
          title: "chore(deps): update ibira.js to ${{ steps.resolve.outputs.tag }}"
          body: |
            ## ibira.js → ${{ steps.resolve.outputs.tag }}

            Updates the `ibira.js` jsDelivr CDN URL and npm fallback dependency to the latest release.

            | | |
            |---|---|
            | **Previous CDN** | `${{ steps.current.outputs.current_url }}` |
            | **New CDN** | `${{ steps.resolve.outputs.cdn_url }}` |
            | **New npm ref** | `${{ steps.resolve.outputs.npm_ref }}` |

            ### Files changed
            - `src/guia.ts` — CDN import URL
            - `src/index.html` — `modulepreload` href and dynamic `import()` CDN URL
            - `package.json` — npm fallback dependency tag
            - `src/types/paraty-geocore.d.ts` — TypeScript ambient module declaration CDN URL
            - `__tests__/` and `test/` — CDN import URLs in test files (if any)
            - `*.md` — CDN URL and version references in documentation (if any)

            ### Checks
            - [x] npm dependencies installed (`npm install`)
            - [x] Syntax and type validation (`npm run validate`)
            - [x] Unit & integration tests (`npm test`)
            - [x] ibira.js related tests adjusted and re-run
            - [x] ibira.js related documentation updated

            > Triggered by: `${{ github.event_name }}`
          labels: dependencies
