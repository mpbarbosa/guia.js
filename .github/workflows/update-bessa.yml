# update-bessa.yml
# Checks for a new bessa_patterns.ts release on GitHub and updates the
# jsDelivr CDN URL in src/index.html (importmap entry), and any test or
# documentation files that reference the version string, then opens a pull
# request with the full set of changes.
#
# bessa_patterns.ts is consumed via a jsDelivr CDN URL hard-coded in
# src/index.html as an importmap entry (not via package.json), so no npm
# install is needed — only a URL version-string replacement in index.html
# and any related files.
#
# CDN URL pattern:
#   https://cdn.jsdelivr.net/gh/mpbarbosa/bessa_patterns.ts@<TAG>/dist/index.mjs
#
# Triggers:
#   - Weekly schedule (Tuesday 09:00 UTC) — keeps the dependency current
#   - workflow_dispatch — pin to a specific version or force a refresh

name: Update bessa_patterns.ts

on:
  schedule:
    - cron: '0 9 * * 2'   # every Tuesday at 09:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: |
          bessa_patterns.ts tag to update to (e.g. v0.13.1-alpha).
          Leave blank to use the latest published release.
        required: false
        default: ''

permissions:
  contents: write        # push update branch
  pull-requests: write   # open / update PR

# Prevent concurrent runs from racing on the same PR branch.
# cancel-in-progress: false queues the second run rather than dropping it,
# ensuring every scheduled or manual trigger is eventually processed.
concurrency:
  group: update-bessa-patterns
  cancel-in-progress: false

jobs:
  update-bessa:
    name: Check & Update bessa_patterns.ts
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'   # disable git hooks in CI (pre-push hook runs npm test)

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      # ── 3. Resolve target version ─────────────────────────────────────────────
      - name: Resolve target bessa_patterns.ts version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION#v}"
            TAG="v${VERSION}"
            echo "Source: workflow_dispatch input"
          else
            # Use git ls-remote to find the latest tag (works without auth for public repos,
            # and avoids the GitHub Releases API which requires the repo to have "releases").
            TAG="$(git ls-remote --tags --refs --sort=-version:refname \
              https://github.com/mpbarbosa/bessa_patterns.ts.git \
              | head -1 | awk '{print $2}' | sed 's|refs/tags/||')"
            [[ -n "${TAG}" ]] || { echo "❌  Could not determine latest bessa_patterns.ts tag." >&2; exit 1; }
            VERSION="${TAG#v}"
            echo "Source: git ls-remote latest tag"
          fi

          CDN_URL="https://cdn.jsdelivr.net/gh/mpbarbosa/bessa_patterns.ts@${TAG}/dist/index.mjs"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "cdn_url=${CDN_URL}" >> "$GITHUB_OUTPUT"
          echo "ℹ️  Target: bessa_patterns.ts ${TAG}"
          echo "ℹ️  CDN URL: ${CDN_URL}"

      # ── 4. Check current version ──────────────────────────────────────────────
      - name: Check current bessa_patterns.ts version in src/index.html
        id: current
        run: |
          CURRENT_URL="$(grep -oP 'https://cdn\.jsdelivr\.net/gh/mpbarbosa/bessa_patterns\.ts@[^/]+/dist/index\.mjs' src/index.html | head -1)"
          CURRENT_VERSION="$(echo "${CURRENT_URL}" | grep -oP '(?<=bessa_patterns\.ts@)[^/]+')"

          echo "current_url=${CURRENT_URL}"         >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          TARGET_URL="${{ steps.resolve.outputs.cdn_url }}"

          echo "ℹ️  CDN: ${CURRENT_URL}  (target: ${TARGET_URL})"

          if [[ "${CURRENT_URL}" == "${TARGET_URL}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "✅  bessa_patterns.ts is already at ${{ steps.resolve.outputs.tag }} — nothing to do."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  CDN needs update: ${CURRENT_URL}  →  ${TARGET_URL}"
          fi

      # ── 5. Update CDN URL in src/index.html ───────────────────────────────────
      # bessa_patterns.ts appears in the importmap <script> block in index.html.
      - name: Update bessa_patterns.ts CDN URL in src/index.html
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"

          sed -i "s|${OLD_URL}|${NEW_URL}|g" src/index.html
          COUNT="$(grep -c "${NEW_URL}" src/index.html || true)"
          echo "✅  src/index.html updated (${COUNT} occurrence(s) replaced)."

      # ── 6. Run validation ─────────────────────────────────────────────────────
      - name: Run validation (npm run validate)
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          npm ci
          npm run validate

      # ── 7. Run tests ──────────────────────────────────────────────────────────
      - name: Run unit & integration tests
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          node --experimental-vm-modules node_modules/jest/bin/jest.js \
            --forceExit \
            --testPathIgnorePatterns="/node_modules/" \
            --testPathIgnorePatterns="/__mocks__/" \
            --testPathIgnorePatterns="/__tests__/helpers/" \
            --testPathIgnorePatterns="/__tests__/e2e/" \
            --testPathIgnorePatterns="/test/app.test.js" \
            --testPathIgnorePatterns="/test/app.test.ts" \
            --testPathIgnorePatterns="/test/main.test.ts" \
            --testPathIgnorePatterns="/test/utils/version-display-manager.test.ts" \
            --testPathIgnorePatterns="/test/html/HTMLHeaderDisplayer.test.ts" \
            --testPathIgnorePatterns="/test/speech/SpeechSynthesisManager.facade-wip.test.js" \
            --testPathIgnorePatterns="/test/types/paraty-geocore.d.test.ts" \
            --testPathIgnorePatterns="/test/types/global.d.test.ts" \
            --testPathIgnorePatterns="/test/vite-env.d.test.ts" \
            --testPathIgnorePatterns="__tests__/types/paraty-geocore.test.js" \
            --testPathIgnorePatterns="test/core/GeocodingState.test.js"

      # ── 8. Adjust bessa_patterns.ts related tests ─────────────────────────────
      # Finds test files that reference bessa_patterns.ts CDN URL and applies
      # the version-string replacement, then re-runs only those test files.
      - name: Adjust bessa_patterns.ts related tests
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"
          OLD_VERSION="${{ steps.current.outputs.current_version }}"
          NEW_VERSION="${{ steps.resolve.outputs.version }}"

          echo "ℹ️  Scanning test/ and __tests__/ for bessa_patterns.ts references…"

          mapfile -t TEST_FILES < <(grep -rl "bessa" test/ __tests__/ 2>/dev/null || true)

          if [[ ${#TEST_FILES[@]} -eq 0 ]]; then
            echo "ℹ️  No bessa_patterns.ts references found in test files — nothing to adjust."
          else
            echo "📄  Test files with bessa_patterns.ts references: ${TEST_FILES[*]}"

            for f in "${TEST_FILES[@]}"; do
              # Replace full CDN URL first to avoid double-processing the version token
              if [[ -n "${OLD_URL}" ]]; then
                sed -i "s|${OLD_URL}|${NEW_URL}|g" "${f}"
              fi
              # Replace any remaining bare version strings on bessa lines
              if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
                grep -n "bessa" "${f}" | grep -q "${OLD_VERSION}" && \
                  sed -i "/bessa/s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}" || true
              fi
              echo "   ✏️  Updated: ${f}"
            done

            echo "🧪  Re-running affected test files…"
            npx jest --passWithNoTests "${TEST_FILES[@]}"
            echo "✅  Affected tests passed after adjustment."
          fi

      # ── 9. Update bessa_patterns.ts related documentation ─────────────────────
      # Replaces the old CDN URL and version tag in all Markdown files so that
      # CDN snippets and version references stay accurate.
      - name: Update bessa_patterns.ts related documentation
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          OLD_URL="${{ steps.current.outputs.current_url }}"
          NEW_URL="${{ steps.resolve.outputs.cdn_url }}"
          OLD_VERSION="${{ steps.current.outputs.current_version }}"
          NEW_VERSION="${{ steps.resolve.outputs.version }}"

          echo "ℹ️  Scanning Markdown files for bessa_patterns.ts references…"

          mapfile -t DOC_FILES < <(find . -name '*.md' \
            ! -path './node_modules/*' \
            ! -path './.ai_workflow/*' \
            -print 2>/dev/null || true)

          UPDATED=0
          for f in "${DOC_FILES[@]}"; do
            if grep -q "bessa" "${f}" 2>/dev/null; then
              # Replace full CDN URL first (avoids double-processing the version token)
              if [[ -n "${OLD_URL}" ]]; then
                sed -i "s|${OLD_URL}|${NEW_URL}|g" "${f}"
              fi
              # Replace any remaining bare version strings on bessa lines
              if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
                grep -n "bessa" "${f}" | grep -q "${OLD_VERSION}" && \
                  sed -i "/bessa/s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}" || true
              fi
              echo "   ✏️  Updated: ${f}"
              UPDATED=$((UPDATED + 1))
            fi
          done

          if [[ ${UPDATED} -eq 0 ]]; then
            echo "ℹ️  No bessa_patterns.ts references found in documentation — nothing to update."
          else
            echo "✅  Updated ${UPDATED} documentation file(s)."
          fi

      # ── 10. Open pull request ─────────────────────────────────────────────────
      - name: Create pull request
        if: steps.current.outputs.up_to_date != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-bessa-patterns-${{ steps.resolve.outputs.version }}
          delete-branch: true
          commit-message: |
            chore(deps): update bessa_patterns.ts to ${{ steps.resolve.outputs.tag }}

            Update bessa_patterns.ts jsDelivr CDN URL to ${{ steps.resolve.outputs.tag }}.
            CDN URL: ${{ steps.resolve.outputs.cdn_url }}
          title: "chore(deps): update bessa_patterns.ts to ${{ steps.resolve.outputs.tag }}"
          body: |
            ## bessa_patterns.ts → ${{ steps.resolve.outputs.tag }}

            Updates the `bessa_patterns.ts` jsDelivr CDN URL in the importmap to the latest release.

            | | |
            |---|---|
            | **Previous** | `${{ steps.current.outputs.current_url }}` |
            | **New** | `${{ steps.resolve.outputs.cdn_url }}` |

            ### Files changed
            - `src/index.html` — importmap CDN URL version
            - `__tests__/` and `test/` — CDN URL references in test files (if any)
            - `*.md` — CDN URL and version references in documentation (if any)

            ### Checks
            - [x] Syntax and type validation (`npm run validate`)
            - [x] Unit & integration tests
            - [x] bessa_patterns.ts related tests adjusted and re-run
            - [x] bessa_patterns.ts related documentation updated

            > Triggered by: `${{ github.event_name }}`
          labels: dependencies
