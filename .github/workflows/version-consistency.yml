name: Version Consistency Check

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.workflow-config.yaml'
      - 'src/**/*.js'
      - 'src/**/*.ts'
      - 'docs/**/*.md'
      - '.github/**/*.md'
      - '.github/scripts/check-version-consistency.sh'

jobs:
  check-versions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Run canonical version consistency check
        run: ./.github/scripts/check-version-consistency.sh
      
      - name: Check for version placeholders
        run: |
          echo "Checking for version placeholders..."
          
          # Find any X.Y.Z or YYYY-MM-DD placeholders
          if grep -r "version X\.Y\.Z\|0\.0\.0\|YYYY-MM-DD" docs/ .github/ --exclude-dir=node_modules; then
            echo "❌ Found version placeholders that need updating"
            exit 1
          fi
          
          echo "✅ No version placeholders found"
      
      - name: Report results
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "✅ Version consistency check passed"
          echo "Current version: $VERSION"
          echo "All references are consistent"
