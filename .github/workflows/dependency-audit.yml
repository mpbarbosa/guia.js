name: Weekly Dependency Audit

# Run every Monday at 9 AM UTC and allow manual trigger
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:  # Allow manual workflow runs

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        id: audit
        continue-on-error: true
        run: |
          echo "## Security Audit Results" > audit-report.md
          echo "" >> audit-report.md
          npm audit --audit-level=moderate >> audit-report.md 2>&1 || echo "AUDIT_FAILED=true" >> $GITHUB_ENV
          cat audit-report.md
      
      - name: Check for outdated packages
        id: outdated
        continue-on-error: true
        run: |
          echo "" >> audit-report.md
          echo "## Outdated Packages" >> audit-report.md
          echo "" >> audit-report.md
          npm outdated >> audit-report.md 2>&1 || true
          cat audit-report.md
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report-${{ github.run_number }}
          path: audit-report.md
          retention-days: 90
      
      - name: Create issue if vulnerabilities found
        if: env.AUDIT_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportContent = fs.readFileSync('audit-report.md', 'utf8');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security Vulnerabilities Detected - ${new Date().toISOString().split('T')[0]}`,
              body: `## Automated Security Audit Report
            
            The weekly dependency audit has detected security vulnerabilities in the project dependencies.
            
            **Audit Date**: ${new Date().toLocaleString()}
            **Workflow Run**: [#${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            ### Action Required
            - Review the vulnerabilities below
            - Update affected packages with \`npm update\` or \`npm audit fix\`
            - Test thoroughly after updates
            - Close this issue once resolved
            
            ---
            
            <details>
            <summary>📋 Full Audit Report</summary>
            
            \`\`\`
            ${reportContent}
            \`\`\`
            
            </details>
            
            ---
            
            **Recommended Actions:**
            1. Run \`npm audit\` locally to see details
            2. Run \`npm audit fix\` to auto-fix (or \`npm audit fix --force\` for breaking changes)
            3. Review and test changes
            4. Commit updates with reference to this issue (#${context.issue.number})
            
            **Related Documentation:**
            - [npm audit docs](https://docs.npmjs.com/cli/v10/commands/npm-audit)
            - [Dependency management guide](.github/CONTRIBUTING.md)`,
              labels: ['security', 'dependencies', 'automated']
            });
            
            console.log(`Created issue #${issue.data.number}`);
      
      - name: Comment on existing security issue
        if: env.AUDIT_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Find existing open security issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies',
              per_page: 1,
              sort: 'created',
              direction: 'desc'
            });
            
            if (issues.data.length > 0) {
              const latestIssue = issues.data[0];
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: latestIssue.number,
                body: `## 🔄 Follow-up Audit - ${new Date().toISOString().split('T')[0]}
            
            The scheduled dependency audit still detects vulnerabilities.
            
            **Workflow Run**: [#${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            Please review and address the remaining issues. See the attached audit report artifact for details.`
              });
              
              console.log(`Added comment to issue #${latestIssue.number}`);
            }
      
      - name: Set workflow status
        if: env.AUDIT_FAILED == 'true'
        run: |
          echo "::error::Security vulnerabilities detected. Issue created for tracking."
          exit 1
