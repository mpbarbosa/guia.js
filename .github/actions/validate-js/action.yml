name: 'Validate TypeScript/JavaScript'
description: 'Validates syntax for TypeScript and JavaScript files in the project'
inputs:
  files:
    description: 'Space-separated list of files to validate'
    required: false
    default: 'src/guia.ts src/guia_ibge.ts'
runs:
  using: "composite"
  steps:
    - name: Validate file syntax
      shell: bash
      run: |
        echo "Validating file syntax..."
        all_ok=true
        for file in ${{ inputs.files }}; do
          if [ -f "$file" ]; then
            echo "✅ $file found"
          else
            echo "❌ File not found: $file"
            all_ok=false
          fi
        done
        # TypeScript type-checking is handled by npm run validate (tsc --noEmit)
        if [ "$all_ok" = true ]; then
          echo "✅ All files present — TypeScript checked via tsc --noEmit"
        else
          exit 1
        fi
